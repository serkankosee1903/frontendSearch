name: Daily Job Scraper

on:
  schedule:
    # Günde 3 kez çalıştırır (Sabah 08:00, Öğlen 14:00, Akşam 20:00 - UTC saatine göre ayarlanmıştır, TSİ için +3)
    - cron: '0 5,11,17 * * *'
  workflow_dispatch: # Manuel tetiklemeye izin verir

jobs:
  scrape_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python scraper.py
        
      - name: Run Telegram Notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # .env dosyasını runtime'da secret'lardan oluşturuyoruz
          echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" > .env
          echo "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}" >> .env
          python telegram_notifier.py

      - name: Prepare Files for FTP
        run: |
          # HTML dosyasını ana sayfa (index.html) olması için kopyalıyoruz
          cp output/report.html output/index.html

      - name: Sync FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./output/ # Sadece output klasörünün içeriğini gönderir
          dangerous-clean-slate: false # Eski dosyaları tamamen silmemesi için
